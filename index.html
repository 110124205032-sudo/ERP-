<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Portal Login</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="logo">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h2>Welcome to EduTech Portal</h2>
                <p>Sign in to access your account</p>
            </div>

            <!-- Role Selection -->
            <div class="role-selection">
                <button class="role-btn active" data-role="student" type="button">
                    <i class="fa-solid fa-user-graduate"></i>
                    <span>Student</span>
                </button>
                <button class="role-btn" data-role="teacher" type="button">
                    <i class="fa-solid fa-book-open"></i>
                    <span>Teacher</span>
                </button>
                <button class="role-btn" data-role="admin" type="button">
                    <i class="fa-solid fa-briefcase"></i>
                    <span>Admin (HOD)</span>
                </button>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <i class="fa-regular fa-envelope input-icon"></i>
                    <input type="text" id="username" placeholder="Email or Username" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="Password" required>
                    <i class="fa-regular fa-eye-slash toggle-password" id="togglePassword" title="Toggle Password Visibility"></i>
                </div>

                <div class="form-actions">
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Log In</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
